services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: vision-mediamtx
    ports:
      - "8554:8554"

  kafka:
    image: apache/kafka:3.7.0
    container_name: vision-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
  triton:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    container_name: vision-triton
    command: tritonserver --model-repository=/models --allow-metrics=true --metrics-port=8002
    volumes:
      - ./model_repository:/models
    ports:
      - "8001:8001"
      - "8002:8002"
    restart: unless-stopped

  ingest:
    build:
      context: .
      dockerfile: services/ingest/Dockerfile
    container_name: vision-ingest
    env_file: .env
    depends_on: [kafka, mediamtx]
    restart: unless-stopped

  ingest2:
    build:
      context: .
      dockerfile: services/ingest/Dockerfile
    container_name: vision-ingest2
    env_file: .env
    depends_on: [kafka, mediamtx]
    restart: unless-stopped
    environment:
      CAMERA_ID: cam2
      RTSP_URL: rtsp://mediamtx:8554/cam2

  ingest3:
    build:
      context: .
      dockerfile: services/ingest/Dockerfile
    container_name: vision-ingest3
    env_file: .env
    depends_on: [kafka, mediamtx]
    restart: unless-stopped
    environment:
      CAMERA_ID: cam3
      RTSP_URL: rtsp://mediamtx:8554/cam3

  detector:
    build:
      context: .
      dockerfile: services/detector/Dockerfile
    container_name: vision-detector
    env_file: .env
    depends_on: [kafka]
    restart: unless-stopped

  tracker:
    build:
      context: .
      dockerfile: services/tracker/Dockerfile
    container_name: vision-tracker
    env_file: .env
    depends_on: [kafka]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: vision-api
    env_file: .env
    depends_on: [kafka]
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: vision-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: vision-grafana
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3000:3000"